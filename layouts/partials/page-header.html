<section class="page-band">
  <div class="container">
    <p class="page-band__crumb">
      <a href="{{ "/" | relURL }}">Home</a>
      <span aria-hidden="true"> / </span>
      <span>{{ .Title }}</span>
    </p>
    <h1>{{ .Title }}</h1>
    {{- with .Params.description }}
      <p class="page-band__desc">{{ . }}</p>
    {{- end }}
  </div>
</section>
