# KilPen Technical Services — 2026 redesign
# Self-contained Hugo site: custom layouts in /layouts, styles in /assets/css/main.css.
# No theme or remote module dependencies.

baseURL = "https://kilpen.com/"
title = "KilPen Technical Services - IT with Aloha"
timeZone = "Pacific/Honolulu"
summaryLength = 10
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
hasCJKLanguage = false
disableLanguages = []

[services]
[services.googleAnalytics]
ID = ''
[services.disqus]
shortname = ''

[permalinks.page]
"pages" = "/:slugorcontentbasename/"

[pagination]
disableAliases = false
pagerSize = 9
path = 'page'

[outputs]
home = ["HTML", "RSS"]

[imaging]
quality = 80
resampleFilter = "Lanczos"

[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"
[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

# Most site images live in assets/images (a Hugoplate convention); mount them
# into static so /images/... URLs keep working without the old image pipeline.
[module]
[[module.mounts]]
source = "assets"
target = "assets"
[[module.mounts]]
source = "static"
target = "static"
[[module.mounts]]
source = "assets/images"
target = "static/images"
[[module.mounts]]
source = "data"
target = "data"
[[module.mounts]]
source = "i18n"
target = "i18n"
[[module.mounts]]
source = "archetypes"
target = "archetypes"
[[module.mounts]]
source = "layouts"
target = "layouts"

[markup]
[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = 'monokai'
lineNumbersInTable = false
noClasses = true

[markup.tableOfContents]
startLevel = 2
endLevel = 5
ordered = true
